name: Build & Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cembeliq/pavingpro

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Jenkins deploy
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_JOB_NAME: ${{ secrets.JENKINS_JOB_NAME }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
        run: |
          JOB_PATH="${JENKINS_JOB_NAME// /%20}"

          CRUMB_JSON=$(curl -s -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
            "$JENKINS_URL/crumbIssuer/api/json")
          CRUMB_FIELD=$(echo "$CRUMB_JSON" | jq -r .crumbRequestField)
          CRUMB=$(echo "$CRUMB_JSON" | jq -r .crumb)

          if [ -z "$CRUMB_FIELD" ] || [ "$CRUMB_FIELD" == "null" ]; then
            echo "Failed to fetch CSRF crumb from Jenkins:"
            echo "$CRUMB_JSON"
            exit 1
          fi

          HTTP_CODE=$(curl -s -o /tmp/jenkins_response.txt -w '%{http_code}' -X POST \
            -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
            -H "$CRUMB_FIELD: $CRUMB" \
            "$JENKINS_URL/job/${JOB_PATH}/buildWithParameters?IMAGE_TAG=sha-${GITHUB_SHA::7}")
          echo "Jenkins responded with HTTP $HTTP_CODE"
          cat /tmp/jenkins_response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
